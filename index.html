<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidence Invaders</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />

    <!-- Phaser 3 via CDN (no npm needed) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script defer src="./mre_data.js"></script>
    <script defer src="./game.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="title">Evidence Invaders</div>
        <div class="header-controls">
          <div class="subtitle">Answer the rule before it lands.</div>
          <button id="music-toggle" class="music-toggle" type="button" aria-pressed="false" title="Toggle background music">
            Music: off
          </button>
        </div>
      </header>

      <main class="main">
        <div class="game-shell">
          <div id="game-wrap" class="game-wrap">
            <div class="crt-scanlines" aria-hidden="true"></div>
            <div id="game" class="game" aria-label="Evidence Invaders game"></div>

            <div id="gameover-overlay" class="gameover-overlay" hidden>
              <div class="gameover-card" role="dialog" aria-modal="true" aria-label="Overlay">
                <div id="overlay-title" class="gameover-title">GET READY</div>
                <div id="overlay-subtitle" class="gameover-subtitle">Starting in 3…</div>
                <button id="restart-btn" class="restart-btn" type="button" hidden>
                  Click to Restart
                </button>
              </div>
            </div>
          </div>

          <section class="hud" aria-label="Answer HUD">
            <div class="hud-top">
              <div class="stat">
                <span class="stat-label">Mode</span>
                <span id="mode" class="stat-value">—</span>
              </div>
              <div class="hud-mid">
                <div id="hud-stats-normal" class="hud-stats-normal">
                  <div class="stat">
                    <span class="stat-label">Score</span>
                    <span id="score" class="stat-value">0</span>
                  </div>
                  <div class="stat">
                    <span class="stat-label">Lives</span>
                    <span id="lives" class="stat-value">3</span>
                  </div>
                </div>
                <div id="hud-stats-learning" class="hud-stats-learning">
                  <div class="stat stat-accuracy">
                    <span class="stat-label stat-accuracy-label">
                      Accuracy
                      <button type="button" id="accuracy-toggle" class="accuracy-toggle" aria-pressed="true" title="Show or hide accuracy">
                        hide
                      </button>
                    </span>
                    <span id="accuracy" class="stat-value">100%</span>
                  </div>
                </div>
              </div>
              <div id="status" class="status" aria-live="polite"></div>
            </div>

            <div class="answers" role="group" aria-label="Answers">
              <button id="answer1" class="answer-btn" type="button" data-choice="0">
                1
              </button>
              <button id="answer2" class="answer-btn" type="button" data-choice="1">
                2
              </button>
              <button id="answer3" class="answer-btn" type="button" data-choice="2">
                3
              </button>
              <button id="answer4" class="answer-btn" type="button" data-choice="3">
                4
              </button>
            </div>

            <div class="hint">
              Controls: press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> or click a button.
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
